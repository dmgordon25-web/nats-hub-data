name: Poll (frequent — game windows)

# Runs every 10 minutes during the typical baseball window (12:00–05:00 UTC,
# which covers afternoon games through late West Coast finals in ET).
# GitHub Actions cron is best-effort and may delay 5–15 min; that's fine.
on:
  schedule:
    - cron: "*/10 12-23 * * *"
    - cron: "*/10 0-4 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Optional reason (for the run log)"
        required: false

permissions:
  contents: write

concurrency:
  group: poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch schedule
        run: python scripts/fetch_schedule.py
        continue-on-error: true

      - name: Fetch standings
        run: python scripts/fetch_standings.py
        continue-on-error: true

      - name: Fetch weather
        run: python scripts/fetch_weather.py
        continue-on-error: true

      - name: Normalize and publish
        run: python scripts/normalize.py

      - name: Commit updated docs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "nats-hub-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/ cache/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(data): poll @ $(date -u +%FT%TZ)"
            git push
          fi
