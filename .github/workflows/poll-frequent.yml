name: Poll (frequent — game windows)

# Runs every 10 minutes during the typical baseball window (12:00–05:00 UTC,
# which covers afternoon games through late West Coast finals in ET).
# GitHub Actions cron is best-effort and may delay 5–15 min; that's fine.
on:
  schedule:
    - cron: "*/10 12-23 * * *"
    - cron: "*/10 0-4 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Optional reason (for the run log)"
        required: false

permissions:
  contents: write
  # actions: write is required so the final "Trigger Pages publish" step can
  # call `gh workflow run` to dispatch publish-pages.yml. Default GITHUB_TOKEN
  # only has actions: read; with that, the dispatch returns 403.
  actions: write

concurrency:
  group: poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch schedule
        run: python scripts/fetch_schedule.py
        continue-on-error: true

      - name: Fetch standings
        run: python scripts/fetch_standings.py
        continue-on-error: true

      - name: Fetch weather
        run: python scripts/fetch_weather.py
        continue-on-error: true

      - name: Normalize and publish
        run: python scripts/normalize.py

      - name: Commit updated docs
        id: commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "nats-hub-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/ cache/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(data): poll @ $(date -u +%FT%TZ)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # GitHub doesn't trigger downstream workflows from GITHUB_TOKEN-authored
      # pushes (a security feature against recursive workflow loops). So even
      # though our poll commits touch docs/, publish-pages.yml never re-runs.
      # Use workflow_dispatch (which IS allowed from GITHUB_TOKEN) to nudge it.
      - name: Trigger Pages publish
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run publish-pages.yml --repo ${{ github.repository }} --ref main
